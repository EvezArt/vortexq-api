name: Security Audit

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run security audit
        run: |
          npm audit --audit-level=moderate 2>/dev/null || true
          pip install pip-audit 2>/dev/null && pip-audit 2>/dev/null || true
